<section class="w-full bg-linear-to-r from-[#8b5cf6] to-[#a78bfa] py-12 px-6">
  <div class="container mx-auto">

    <nav class="flex mb-6 text-sm font-medium text-white/80" aria-label="Breadcrumb">
      <ol class="inline-flex items-center space-x-1">
        <li class="inline-flex items-center">
          <a href="#" class="hover:text-white transition-colors">Home</a>
        </li>
        <li>
          <div class="flex items-center">
            <span class="mx-2 text-white/60">/</span>
            <span class="text-white">Brands</span>
          </div>
        </li>
      </ol>
    </nav>

    <div class="flex items-center gap-5">
      <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-md shadow-lg border border-white/10">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z">
          </path>
        </svg>
      </div>

      <div>
        <h1 class="text-4xl font-extrabold text-white tracking-tight">Top Brands</h1>
        <p class="text-white/90 text-lg mt-1 font-light">Shop from your favorite brands</p>
      </div>
    </div>

  </div>
</section>


<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 p-10">

  @for (item of brands(); track item._id) {

  <div
    class="group relative bg-white border border-green-100 rounded-4xl p-4 shadow-sm transition-all duration-300 ease-in-out hover:-translate-y-3 hover:shadow-xl cursor-pointer">

    <div class="overflow-hidden rounded-2xl aspect-square mb-6 flex items-center justify-center">
      <img [src]="item.image"
        class="w-[80%] h-[80%] object-contain transition-transform duration-500 ease-in-out group-hover:scale-110">
    </div>

    <div class="text-center pb-2">
      <h3 class="text-[#059669] font-bold text-xl mb-2">
        {{ item.name }}
      </h3>

      <a class="inline-flex items-center text-white font-medium transition-colors hover:text-[#059669]">
        View Subcategories
        <svg class="w-4 h-4 ml-2 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
        </svg>
      </a>
    </div>
  </div>
  }
</div>
