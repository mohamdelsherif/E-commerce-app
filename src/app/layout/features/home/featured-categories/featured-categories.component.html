<!-- title -->
<div class="flex items-center gap-3 my-8">
  <div class="h-8 w-1.5 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full"></div>
  <h2 class="text-3xl font-bold text-gray-800">Featured <span class="text-emerald-600">category</span></h2>
</div>

<div class="grid grid-cols-2 gap-3 md:grid-cols-4 lg:grid-cols-6">
  @for (item of AllCategories(); track item._id) {
  <div class="rounded-lg shadow-lg p-4 flex flex-col justify-center items-center py-8">
    <img class="size-16 rounded-full" [src]="item.image" [alt]="item.name" title="{{item.name}}">
    <h2>{{ item.name }}</h2>
  </div>
  }
</div>
