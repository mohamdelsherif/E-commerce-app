<section class="px-6 py-10">

  <div class="container mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">

      <div class="flex items-center gap-3">

        <div class="bg-green-600 text-white w-10 h-10 rounded-lg flex items-center justify-center">
          <i class="fa-solid fa-receipt"></i>
        </div>

        <div>
          <h1 class="text-2xl font-semibold">
            Complete Your Order
          </h1>

          <p class="text-sm text-gray-500">
            Review your items and complete your purchase
          </p>
        </div>

      </div>

      <a class="text-green-600 cursor-pointer hover:text-green-800 flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Cart
      </a>

    </div>


    <!-- Shipping Address Card -->
    <div class="bg-white rounded-xl shadow overflow-hidden w-3/4 mx-auto">

      <!-- Header -->
      <div class="bg-green-700 text-white p-5">

        <h3 class="font-semibold text-lg flex items-center gap-2">
          <i class="fa-solid fa-house"></i>
          Shipping Address
        </h3>

        <p class="text-sm opacity-80">
          Where should we deliver your order?
        </p>

      </div>


      <form [formGroup]="adderssForm" (ngSubmit)="adderssSubmit($event)">
        <div class="p-6 space-y-6">


          <!-- City -->
          <div>
            <label class="block text-sm font-medium mb-2">
              City <span class="text-red-500">*</span>
            </label>

            <div class="flex items-center gap-3 border border-gray-200 rounded-lg px-4 py-3
              focus-within:border-green-600 focus-within:ring-1 focus-within:ring-green-600">

              <i class="fa-solid fa-city text-gray-400"></i>

              <input formControlName="city" type="text" placeholder="e.g. Cairo, Alexandria, Giza"
                class="w-full outline-none border-none text-sm focus:outline-none focus:border-none focus:ring-0 placeholder:text-gray-400" />

            </div>
          </div>


          <!-- Street Address -->
          <div>
            <label class="block text-sm font-medium mb-2">
              Street Address <span class="text-red-500">*</span>
            </label>

            <div class="flex items-start gap-3 border border-gray-200 rounded-lg px-4 py-3
              focus-within:border-green-600 focus-within:ring-1 focus-within:ring-green-600">

              <i class="fa-solid fa-location-dot text-gray-400 mt-1"></i>

              <textarea formControlName="details" rows="3"
                placeholder="Street name, building number, floor, apartment..."
                class="w-full outline-none border-none text-sm focus:outline-none focus:border-none focus:ring-0 resize-none placeholder:text-gray-400"></textarea>

            </div>
          </div>


          <!-- Phone -->
          <div>
            <label class="block text-sm font-medium mb-2">
              Phone Number <span class="text-red-500">*</span>
            </label>

            <div class="flex items-center gap-3 border border-gray-200 rounded-lg px-4 py-3
              focus-within:border-green-600 focus-within:ring-1 focus-within:ring-green-600">

              <i class="fa-solid fa-phone text-gray-400"></i>

              <input formControlName="phone" type="text" placeholder="01xxxxxxxxx"
                class="w-full outline-none border-none text-sm focus:outline-none focus:border-none focus:ring-0  placeholder:text-gray-400" />

            </div>

            <p class="text-xs text-gray-400 mt-1">
              Egyptian numbers only
            </p>
          </div>


          <!-- Payment Methods -->
          <div class="grid grid-cols-2 gap-4">

            <!-- Cash On Delivery -->
            <button type="submit" name="submitBtn" value="cash" class="relative flex flex-col items-center justify-center gap-2 border border-green-600 rounded-xl py-5
        text-green-700 cursor-pointer hover:bg-green-50">

              <!-- arrow indicator -->
              <i class="fa-solid fa-arrow-right absolute right-4 top-4 text-green-600 text-xs"></i>

              <div class="w-10 h-10 bg-green-600 text-white rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-money-bill"></i>
              </div>

              <p class="font-semibold text-sm">
                Cash on Delivery
              </p>

              <p class="text-xs text-gray-500">
                Pay when it arrives
              </p>

            </button>


            <!-- Pay with Visa -->
            <button type="submit" name="submitBtn" value="visa" class="relative flex flex-col items-center justify-center gap-2 border text-green-700 border-green-600 rounded-xl py-5
        cursor-pointer hover:bg-green-50">

              <!-- arrow indicator -->
              <i class="fa-solid fa-arrow-right absolute right-4 top-4 text-green-600 text-xs"></i>

              <div class="w-10 h-10 bg-green-600 text-white rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-credit-card"></i>
              </div>

              <p class="font-semibold text-sm">
                Pay with Visa
              </p>

              <p class="text-xs text-gray-500">
                Secure online payment
              </p>

            </button>

          </div>

        </div>
      </form>

    </div>

  </div>

</section>
