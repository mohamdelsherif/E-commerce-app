<section class="w-full bg-linear-to-r from-[#22c55e] to-[#4ade80] py-12 px-6">
  <div class="container mx-auto">

    <nav class="flex mb-6 text-sm font-medium text-white/80" aria-label="Breadcrumb">
      <ol class="inline-flex items-center space-x-1 md:space-x-3">
        <li class="inline-flex items-center">
          <a href="#" class="hover:text-white transition-colors">Home</a>
        </li>
        <li>
          <div class="flex items-center">
            <span class="mx-2">/</span>
            <span class="text-white">Categories</span>
          </div>
        </li>
      </ol>
    </nav>

    <div class="flex items-center gap-4">
      <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-sm shadow-inner">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
          </path>
        </svg>
      </div>

      <div>
        <h1 class="text-4xl font-bold text-white mb-1">All Categories</h1>
        <p class="text-white/90 text-lg">Browse our wide range of product categories</p>
      </div>
    </div>

  </div>
</section>


<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 p-10">

  @for (item of categories(); track item._id) {

  <div
    class="group relative bg-white border border-green-100 rounded-4xl p-4 shadow-sm transition-all duration-300 ease-in-out hover:-translate-y-3 hover:shadow-xl cursor-pointer">

    <div class="overflow-hidden rounded-2xl aspect-square mb-6">
      <img [src]="item.image"
        class="w-full h-full object-cover transition-transform duration-500 ease-in-out group-hover:scale-110">
    </div>

    <div class="text-center pb-2">
      <h3 class="text-[#059669] font-bold text-xl mb-2">
        {{ item.name }}
      </h3>

      <a class="inline-flex items-center text-white font-medium transition-colors hover:text-[#059669]">
        View Subcategories
        <svg class="w-4 h-4 ml-2 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
        </svg>
      </a>
    </div>
  </div>
  }
</div>
